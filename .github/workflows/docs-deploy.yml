name: Deploy Documentation

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'core-ai/src/main/java/**'
      - 'core-ai-api/src/main/java/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Build VitePress site
        working-directory: docs
        run: npm run build

      - name: Generate JavaDoc
        run: |
          ./gradlew :core-ai-api:javadoc :core-ai:javadoc --no-daemon || true
          mkdir -p docs/.vitepress/dist/api/core-ai-api
          mkdir -p docs/.vitepress/dist/api/core-ai
          if [ -d core-ai-api/build/docs/javadoc ]; then
            cp -r core-ai-api/build/docs/javadoc/* docs/.vitepress/dist/api/core-ai-api/
          fi
          if [ -d core-ai/build/docs/javadoc ]; then
            cp -r core-ai/build/docs/javadoc/* docs/.vitepress/dist/api/core-ai/
          fi
          cat > docs/.vitepress/dist/api/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Core-AI API Reference</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 80px auto; padding: 0 24px; color: #213547; }
              h1 { font-size: 32px; }
              ul { line-height: 2; }
              a { color: #3c8772; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Core-AI API Reference</h1>
            <p>Select a module to browse its JavaDoc:</p>
            <ul>
              <li><a href="./core-ai-api/index.html">core-ai-api</a> — Public API interfaces (AgentSession, events)</li>
              <li><a href="./core-ai/index.html">core-ai</a> — Core implementation (Agent, LLMProvider, tools, session)</li>
            </ul>
            <p><a href="../">&larr; Back to documentation</a></p>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
