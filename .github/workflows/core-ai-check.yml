name: Core AI Check

on:
  pull_request:
    branches: [master]
    paths:
      - 'core-ai/**'
      - 'core-ai-api/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/core-ai-check.yml'
  push:
    branches: [master]
    paths:
      - 'core-ai/**'
      - 'core-ai-api/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'buildSrc/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/core-ai-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-ai-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check core libraries
        run: ./gradlew :core-ai-api:check :core-ai:ciCheck --no-daemon --stacktrace
