name: Release CLI

on:
  push:
    branches: [master]
    paths:
      - 'core-ai-cli/src/main/resources/VERSION'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: false
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            binary: core-ai-cli
            gradlew: ./gradlew
          - os: windows-latest
            target: windows
            binary: core-ai-cli.exe
            gradlew: .\gradlew.bat
          - os: macos-latest
            target: darwin
            binary: core-ai-cli
            gradlew: ./gradlew
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: core-ai-frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Run gradle check
        run: ${{ matrix.gradlew }} :core-ai-cli:check

      - name: Native compile CLI
        run: ${{ matrix.gradlew }} :core-ai-cli:nativeCompile

      - name: Rename binary with platform suffix
        id: rename
        shell: bash
        run: |
          SRC=build/core-ai-cli/native/nativeCompile/${{ matrix.binary }}
          if [ "${{ matrix.target }}" = "windows" ]; then
            DST=core-ai-cli-windows.exe
          else
            DST=core-ai-cli-${{ matrix.target }}
          fi
          mv "$SRC" "build/core-ai-cli/native/nativeCompile/$DST"
          echo "path=build/core-ai-cli/native/nativeCompile/$DST" >> $GITHUB_OUTPUT

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: core-ai-cli-${{ matrix.target }}
          path: ${{ steps.rename.outputs.path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(cat core-ai-cli/src/main/resources/VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: core-ai-cli-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
